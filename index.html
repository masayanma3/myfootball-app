<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Football">
<meta name="theme-color" content="#080810">
<title>My Football</title>
<style>
/* ... (CSSは元のままなので省略、必要に応じて元のCSSをここに貼ってください) ... */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080810;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-text-size-adjust:100%;color:#e8e8f8}
:root{
  --bg:#080810;--bg2:#0f0f1a;--bg3:#161625;
  --pk:#ff2d78;--pk2:#ff6fa8;--pk-dim:rgba(255,45,120,.13);--pk-glow:rgba(255,45,120,.32);
  --cy:#00e5ff;--cy2:#80f0ff;--cy-dim:rgba(0,229,255,.10);--cy-glow:rgba(0,229,255,.28);
  --gr:#00ff99;--gr-dim:rgba(0,255,153,.10);
  --am:#ffb300;--am-dim:rgba(255,179,0,.10);
  --txt:#e8e8f8;--txt2:#9090b0;--txt3:#4a4a6a;
  --bdr:rgba(255,45,120,.2);
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
}
.shell{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg);overflow:hidden}
.sbar{padding:calc(var(--safe-top) + 10px) 18px 6px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:var(--txt2);background:var(--bg);flex-shrink:0}
.sbar-r{display:flex;align-items:center;gap:8px}
.hdr{padding:8px 14px 0;flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:36px;height:36px;background:var(--pk-dim);border:1px solid var(--pk);border-radius:10px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 6px var(--pk-glow));flex-shrink:0}
.logo-name{font-size:21px;font-weight:700;color:var(--txt);letter-spacing:.5px;text-transform:uppercase}
.logo-sub{font-size:10px;color:var(--cy);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.date-chip{font-size:11px;color:var(--cy2);background:var(--cy-dim);border:0.5px solid rgba(0,229,255,.3);padding:4px 10px;border-radius:4px;white-space:nowrap}
.refresh-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;border:0.5px solid var(--bdr);background:var(--pk-dim);cursor:pointer;transition:all .2s}
.refresh-btn:active{transform:scale(0.9)}
.refresh-btn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.neon-line{height:1px;background:linear-gradient(90deg,transparent,var(--pk) 30%,var(--cy) 70%,transparent);margin:0 14px;opacity:.5;flex-shrink:0}
.tts-bar{background:var(--bg2);border-bottom:0.5px solid var(--bdr);padding:8px 12px;display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.tts-bar-top{display:flex;align-items:center;gap:6px}
.tts-label{font-size:10px;font-weight:700;color:var(--cy);text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}
.tts-all-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:4px;border:1px solid var(--pk);background:var(--pk-dim);color:var(--pk2);font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;min-height:36px;transition:all .15s}
.tts-all-btn.speaking{background:var(--pk);color:#fff;filter:drop-shadow(0 0 8px var(--pk-glow))}
.tts-stop-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:4px;border:1px solid var(--txt3);background:transparent;color:var(--txt3);font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;min-height:36px}
.tts-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tts-chips::-webkit-scrollbar{display:none}
.tts-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:3px;border:0.5px solid var(--txt3);font-size:11px;font-weight:700;color:var(--txt3);background:transparent;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;min-height:36px;transition:all .15s}
.tts-chip.speaking{border-color:var(--cy);color:var(--cy);background:var(--cy-dim)}
.tts-status{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:6px;min-height:16px}
.tts-wave{display:flex;align-items:flex-end;gap:2px;height:14px}
.tts-wave span{width:3px;background:var(--cy);border-radius:1px;animation:wave .8s ease-in-out infinite}
.tts-wave span:nth-child(2){animation-delay:.1s}.tts-wave span:nth-child(3){animation-delay:.2s}
.tts-wave span:nth-child(4){animation-delay:.3s}.tts-wave span:nth-child(5){animation-delay:.4s}
@keyframes wave{0%,100%{height:4px}50%{height:14px}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.tabbar{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 10px;border-bottom:1px solid rgba(255,45,120,.15);flex-shrink:0;-webkit-overflow-scrolling:touch}
.tabbar::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:10px 12px;font-size:11px;font-weight:700;color:var(--txt3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;transition:color .15s;min-height:44px}
.tb.on{color:var(--pk);border-bottom-color:var(--pk);filter:drop-shadow(0 0 6px var(--pk-glow))}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 13px 8px}
.body::-webkit-scrollbar{display:none}
.slbl{font-size:10px;font-weight:700;color:var(--cy);letter-spacing:.15em;text-transform:uppercase;margin:10px 0 6px;display:flex;align-items:center;gap:6px}
.slbl::after{content:'';flex:1;height:0.5px;background:linear-gradient(90deg,var(--cy-dim),transparent)}
.mc{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:6px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)}
.mc.epl-a{border-left:2px solid var(--pk)}
.mc.fa-a{border-left:2px solid #e83030}
.mc.ucl-a{border-left:2px solid var(--am)}
.mc.wc-a{border-left:2px solid var(--gr)}
.mc.pd-a{border-left:2px solid #c8102e}
.mc.sa-a{border-left:2px solid #009246}
.mc.bl1-a{border-left:2px solid #d00027}
.mc.fl1-a{border-left:2px solid #003189}
.mc-body{flex:1;min-width:0}
.mc-comp{font-size:10px;color:var(--txt3);margin-bottom:3px;display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.04em;flex-wrap:wrap}
.mc-teams{font-size:14px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-teams em{font-style:normal;color:var(--txt3);font-weight:500;font-size:12px}
.mc-score{font-size:16px;font-weight:700;color:var(--cy);white-space:nowrap}
.mc-right{text-align:right;flex-shrink:0;min-width:64px}
.mc-date{font-size:10px;color:var(--txt3)}
.mc-time{font-size:14px;font-weight:700;color:var(--cy)}
.sbtn{background:none;border:none;cursor:pointer;opacity:.2;transition:opacity .15s;flex-shrink:0;padding:4px;display:flex;align-items:center;min-width:36px;min-height:36px;justify-content:center}
.sbtn.on{opacity:1;filter:drop-shadow(0 0 5px var(--am))}
.bdg{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;line-height:1.5;white-space:nowrap;letter-spacing:.05em;text-transform:uppercase}
.b-live{background:rgba(255,50,50,.15);color:#ff6868;border:0.5px solid rgba(255,50,50,.4)}
.b-soon{background:rgba(255,179,0,.12);color:#ffb300;border:0.5px solid rgba(255,179,0,.3)}
.b-fin{background:rgba(100,100,120,.15);color:var(--txt3);border:0.5px solid rgba(100,100,120,.3)}
.b-epl{background:var(--pk-dim);color:var(--pk2);border:0.5px solid var(--bdr)}
.b-fa{background:rgba(232,48,48,.12);color:#ff8888;border:0.5px solid rgba(232,48,48,.3)}
.b-ucl{background:rgba(255,179,0,.12);color:var(--am);border:0.5px solid rgba(255,179,0,.3)}
.b-conf{background:var(--gr-dim);color:var(--gr);border:0.5px solid rgba(0,255,153,.3)}
.b-rum{background:var(--am-dim);color:var(--am);border:0.5px solid rgba(255,179,0,.3)}
.b-hot{background:var(--pk-dim);color:var(--pk2);border:0.5px solid var(--bdr)}
.b-wc{background:var(--gr-dim);color:var(--gr);border:0.5px solid rgba(0,255,153,.25)}
.b-pd{background:rgba(200,16,46,.12);color:#e84060;border:0.5px solid rgba(200,16,46,.3)}
.b-sa{background:rgba(0,146,70,.12);color:#20c060;border:0.5px solid rgba(0,146,70,.3)}
.b-bl1{background:rgba(208,0,39,.12);color:#e84060;border:0.5px solid rgba(208,0,39,.3)}
.b-fl1{background:rgba(0,49,137,.15);color:#6699ee;border:0.5px solid rgba(0,49,137,.3)}
.news-card{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:6px;padding:12px 13px;margin-bottom:9px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);cursor:pointer;transition:border-color .15s}
.news-card:hover{border-color:rgba(255,45,120,.4)}
.news-card.transfer{border-left:2px solid var(--pk)}
.news-card.match{border-left:2px solid var(--cy)}
.news-card.general{border-left:2px solid var(--txt3)}
.news-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.news-source-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.news-source{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.news-time{font-size:10px;color:var(--txt3)}
.news-title{font-size:13px;font-weight:700;color:var(--txt);line-height:1.45;flex:1;min-width:0}
.news-badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;align-items:flex-start}
.news-desc{font-size:11px;color:var(--txt2);line-height:1.55;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-link{font-size:10px;color:var(--cy);text-transform:uppercase;letter-spacing:.07em;margin-top:6px;display:inline-block}
.brief-sec{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:6px;overflow:hidden;margin-bottom:10px}
.brief-hdr{padding:10px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--bdr);background:linear-gradient(90deg,var(--pk-dim),transparent)}
.bh-left{display:flex;align-items:center;gap:10px}
.bh-title{font-size:13px;font-weight:700;color:var(--txt);text-transform:uppercase;letter-spacing:.4px}
.bh-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.brief-body{padding:10px 13px}
.bday-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:0.5px solid rgba(255,45,120,.08)}
.bday-row:last-child{border-bottom:none;padding-bottom:0}
.bday-av{width:38px;height:38px;border-radius:4px;background:var(--pk-dim);border:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--pk2);flex-shrink:0}
.bday-name{font-size:13px;font-weight:700;color:var(--txt)}
.bday-det{font-size:11px;color:var(--txt3);margin-top:1px;text-transform:uppercase;letter-spacing:.04em}
.bday-age{font-size:18px;font-weight:700;color:var(--pk);flex-shrink:0;text-align:right;filter:drop-shadow(0 0 5px var(--pk-glow))}
.bday-age small{display:block;font-size:10px;color:var(--txt3);text-align:right;font-weight:400}
.trivia-item{padding:9px 0;border-bottom:0.5px solid rgba(0,229,255,.08)}
.trivia-item:last-child{border-bottom:none;padding-bottom:0}
.tri-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.tt-hist{background:rgba(48,96,232,.15);color:#88aaff;border:0.5px solid rgba(48,96,232,.3)}
.tt-rec{background:var(--gr-dim);color:var(--gr);border:0.5px solid rgba(0,255,153,.25)}
.tt-fact{background:var(--pk-dim);color:var(--pk2);border:0.5px solid var(--bdr)}
.tri-txt{font-size:13px;color:var(--txt2);line-height:1.6}
.sec-tts-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:3px;border:0.5px solid var(--txt3);background:transparent;color:var(--txt3);font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;flex-shrink:0;min-height:36px}
.sec-tts-btn.speaking{border-color:var(--cy);color:var(--cy);background:var(--cy-dim)}
.standings-table{width:100%;border-collapse:collapse;font-size:12px}
.standings-table th{color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:6px 4px;border-bottom:0.5px solid var(--bdr);text-align:center}
.standings-table th:first-child{text-align:left;padding-left:0}
.standings-table td{padding:8px 4px;border-bottom:0.5px solid rgba(255,45,120,.06);text-align:center;color:var(--txt2)}
.standings-table td:first-child{text-align:left;padding-left:0;color:var(--txt);font-weight:500}
.standings-table tr:last-child td{border-bottom:none}
.pos-num{color:var(--txt3);font-size:11px;min-width:18px;display:inline-block}
.pos-num.champions{color:var(--cy)}.pos-num.europa{color:var(--gr)}.pos-num.relegation{color:#ff6868}
.pts{color:var(--cy);font-weight:700}
.wday-block{margin-bottom:14px}
.wday-lbl{font-size:11px;font-weight:700;color:var(--txt3);margin-bottom:6px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.1em}
.wday-today-lbl{color:var(--cy)}
.wrow{background:var(--bg2);border-radius:4px;padding:9px 11px;display:flex;align-items:center;gap:8px;margin-bottom:5px;border:0.5px solid var(--bdr)}
.wrow-comp{font-size:10px;color:var(--txt3);flex-shrink:0;min-width:52px;text-transform:uppercase}
.wrow-teams{font-size:13px;font-weight:700;color:var(--txt);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wrow-time{font-size:12px;color:var(--cy);flex-shrink:0;font-weight:700}
.set-block{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:6px;padding:14px;margin-bottom:12px}
.set-title{font-size:12px;font-weight:700;color:var(--cy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.set-title::before{content:'';width:3px;height:14px;background:var(--cy);border-radius:1px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid rgba(255,45,120,.08)}
.srow:last-of-type{border-bottom:none}
.srow-lbl{font-size:13px;color:var(--txt2)}
.srow-lbl small{display:block;font-size:11px;color:var(--txt3);margin-top:2px}
.sel-dark{font-size:13px;padding:6px 12px;border-radius:6px;border:0.5px solid var(--bdr);color:var(--cy);background:var(--bg3);cursor:pointer;min-height:36px}
.tog{width:48px;height:28px;border-radius:4px;border:0.5px solid var(--txt3);cursor:pointer;position:relative;transition:all .2s;background:var(--bg3);flex-shrink:0}
.tog::after{content:'';position:absolute;top:4px;left:4px;width:18px;height:18px;border-radius:2px;background:var(--txt3);transition:all .2s}
.tog.on{background:var(--pk-dim);border-color:var(--pk)}
.tog.on::after{left:24px;background:var(--pk)}
.save-cyber{width:100%;margin-top:14px;padding:13px;border-radius:6px;background:var(--pk-dim);border:1px solid var(--pk);font-size:14px;font-weight:700;color:var(--pk);cursor:pointer;text-transform:uppercase;letter-spacing:.12em;min-height:48px}
.save-cyber:active{background:var(--pk);color:#fff}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:10px}
.loading-spinner{width:28px;height:28px;border:2px solid var(--bdr);border-top-color:var(--cy);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-text{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em}
.error-box{background:rgba(255,50,50,.08);border:0.5px solid rgba(255,50,50,.3);border-radius:8px;padding:14px;margin-bottom:10px;font-size:12px;color:#ff8888;line-height:1.6}
.last-updated{font-size:10px;color:var(--txt3);text-align:right;padding:2px 0 8px;text-transform:uppercase;letter-spacing:.06em}
.empty{text-align:center;padding:24px 0;color:var(--txt3);font-size:13px;text-transform:uppercase;letter-spacing:.06em}
.toast-cyber{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--bg2);border:0.5px solid var(--cy);border-radius:8px;padding:10px 18px;font-size:13px;color:var(--cy);text-align:center;opacity:0;transition:opacity .35s;letter-spacing:.06em;white-space:nowrap;z-index:100}
.bnav{display:flex;border-top:1px solid rgba(255,45,120,.2);background:var(--bg);padding:8px 0 calc(8px + var(--safe-bottom));position:relative;flex-shrink:0}
.bnav::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pk) 40%,var(--cy) 60%,transparent);opacity:.6}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;min-height:44px;justify-content:center}
.bni-lb{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.bni.on .bni-lb{color:var(--pk)}
.bni.on svg{filter:drop-shadow(0 0 6px var(--pk-glow))}
.frow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.frow::-webkit-scrollbar{display:none}
.fp{flex-shrink:0;padding:6px 13px;border-radius:3px;border:0.5px solid var(--txt3);font-size:11px;font-weight:700;color:var(--txt3);background:transparent;cursor:pointer;white-space:nowrap;text-transform:uppercase;min-height:36px;display:flex;align-items:center}
.fp.on{background:var(--pk-dim);border-color:var(--pk);color:var(--pk)}
.src-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:2px}
.src-bbc{background:#bb1919}.src-sky{background:#0072ce}.src-guardian{background:#005689}.src-athletic{background:#2e4057}.src-mirror{background:#d60000}.src-sun{background:#e8262c}.src-default{background:var(--txt3)}
</style>

/* ── CONFIG ── */
const FOOTBALL_API_TOKEN = '9e94dbfdff6248089ce4ebb50e6ba2d6';
const FOOTBALL_DIRECT = 'https://api.football-data.org/v4';
const CORS_PRIMARY   = 'https://corsproxy.io/?';

async function footballFetch(path) {
  const sep = path.includes('?') ? '&' : '?';
  const targetUrl = `https://api.football-data.org/v4${path}${sep}token=${FOOTBALL_API_TOKEN}`;
  try {
    const res = await fetch(CORS_PRIMARY + encodeURIComponent(targetUrl), {signal: AbortSignal.timeout(8000)});
    if (!res.ok) throw new Error(`corsproxy HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    console.warn('footballFetch failed:', e.message);
    throw e;
  }
}

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
const RSS_FEEDS = [
  {url:'https://www.skysports.com/rss/12040', name:'Sky Sports', cat:'transfer'},
  {url:'https://talksport.com/football/transfers/feed/', name:'TalkSPORT', cat:'transfer'},
  {url:'https://www.bbc.co.uk/sport/football/premier-league/rss.xml', name:'BBC Sport', cat:'match'},
  {url:'https://www.theguardian.com/football/rss', name:'Guardian', cat:'general'},
];

/* ── STATE ── */
let cachedMatches = {};
let cachedStandings = null;
let cachedNews = [];
let lastMatchUpdate = null;

let starred = new Set(JSON.parse(localStorage.getItem('starred')||'[]'));
let activeTab = 'morning';
let newsFilter = 'all';
const togg = JSON.parse(localStorage.getItem('togg')||'{"matches":true,"bday":true,"trivia":true}');

/* ── STATIC DATA ── */

  {initials:'DB',name:'デイヴィッド・ベッカム',born:1975,club:'元マンチェスター・U',month:5,day:2},

];

const BUILTIN_TRIVIA = [
  {tag:'history',label:'History',text:'1888年、ウィリアム・マクレガーがフットボールリーグを創設。世界初のプロリーグは全12クラブでスタートした。'},
  {tag:'record',label:'Record',text:'プレミアリーグ最速ゴール記録はシェーン・ロングの7秒69。2019年のバーンリー戦、キックオフ直後のゴールだった。'},
  {tag:'fact',label:'Fact',text:'リバプールの「You’ll Never Walk Alone」は1963年のミュージカル曲。サポーターの合唱で世界的に有名になった。'}
];

const USER_TRIVIA = [
  {tag:'history',label:'History',text:'1992年、フットボールリーグ・ファーストディビジョンが改組され、現在の「プレミアリーグ」が誕生した。'},

  {tag:'record',label:'Record',text:'アラン・シアラーが持つプレミアリーグ通算260ゴールは、未だに破られていない歴代最多得点記録。'}
];
const TRIVIA = [...BUILTIN_TRIVIA, ...USER_TRIVIA];

/* ── FUNCTIONS ── */
document.getElementById('today-chip').textContent = `${now.getMonth()+1}/${now.getDate()}`;
function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}
updateClock(); setInterval(updateClock,30000);

function stripHtml(str=''){return str.replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').trim();}
function relTime(dateStr){
  const d=new Date(dateStr);const diff=(Date.now()-d.getTime())/1000;
  if(diff<3600)return Math.floor(diff/60)+'分前';
  if(diff<86400)return Math.floor(diff/3600)+'時間前';
  return Math.floor(diff/86400)+'日前';
}
function classifyNews(title=''){
  const t=title.toLowerCase();
  if(['transfer','signing','deal','loan','bid'].some(k=>t.includes(k)))return'transfer';
  if(['match','preview','result','goal','vs'].some(k=>t.includes(k)))return'match';
  return'general';
}
function sourceDotClass(src=''){
  const s=src.toLowerCase();
  if(s.includes('bbc'))return'src-bbc';
  if(s.includes('sky'))return'src-sky';
  return'src-default';
}

async function fetchRSSFeed(feed){
  try{
    const res=await fetch(RSS2JSON+encodeURIComponent(feed.url)+'&count=8');
    const data=await res.json();
    return (data.items||[]).map(item=>({
      title: stripHtml(item.title||''),
      desc: stripHtml(item.description||'').slice(0,100),
      link: item.link||'',
      pubDate: item.pubDate||'',
      source: feed.name,
      cat: classifyNews(item.title||'')
    }));
  }catch(e){return[];}
}

async function refreshNews(){
  const results=await Promise.all(RSS_FEEDS.map(fetchRSSFeed));
  cachedNews=[].concat(...results).sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
  lastNewsUpdate=new Date();
}

async function fetchMatches(compId){
  try{const data=await footballFetch(`/competitions/${compId}/matches?dateFrom=${new Date().toISOString().split('T')[0]}&status=SCHEDULED,LIVE,FINISHED`); return data.matches||[];}
  catch(e){return null;}
}
async function fetchStandings(){
  try{const data=await footballFetch('/competitions/PL/standings'); return data.standings?.[0]?.table||[];}
  catch(e){return null;}
}

async function refreshAll(){
  document.getElementById('refresh-btn').classList.add('spinning');
  toast('更新中...');
  try {
    const results = await Promise.allSettled([
      fetchMatches('PL'), fetchMatches('FAC'), fetchMatches('CL'), fetchMatches('WC'),
      fetchMatches('PD'), fetchMatches('SA'), fetchMatches('BL1'), fetchMatches('FL1'),
      fetchStandings()
    ]);
    const keys=['epl','fa','ucl','wc','pd','sa','bl1','fl1'];
    results.forEach((r,i)=>{ if(r.status==='fulfilled'&&r.value){ if(i<8)cachedMatches[keys[i]]=r.value; else cachedStandings=r.value; } });
    lastMatchUpdate=new Date();
    await refreshNews();
    toast('更新完了');
  } catch(e){ toast('エラー発生'); }
  document.getElementById('refresh-btn').classList.remove('spinning');
  render();
}

function parseMatch(m,cat){
  const local=new Date(m.utcDate);
  const isToday=local.toDateString()===new Date().toDateString();
  return{id:m.id,cat,comp:m.competition.name,home:m.homeTeam.shortName||m.homeTeam.name,away:m.awayTeam.shortName||m.awayTeam.name,time:`${String(local.getHours()).padStart(2,'0')}:${String(local.getMinutes()).padStart(2,'0')}`,date:isToday?'今日':`${local.getMonth()+1}/${local.getDate()}`,status:m.status.toLowerCase(),score:m.score.fullTime.home!==null?`${m.score.fullTime.home}-${m.score.fullTime.away}`:null,isToday};
}

function getAllMatches(){
  const r=[];
  for(const[cat,ms]of Object.entries(cachedMatches))if(ms)ms.forEach(m=>r.push(parseMatch(m,cat)));
  return r;
}

function mCard(m){
  const s=starred.has(m.id);
  return `<div class="mc ${m.cat}-a">
    <button class="sbtn ${s?'on':''}" onclick="toggleStar(${m.id})"><svg width="18" height="18" viewBox="0 0 20 20"><use href="#ic-star${s?'-fill':''}"/></svg></button>
    <div class="mc-body"><div class="mc-comp">${m.comp}</div><div class="mc-teams">${m.home} <em>vs</em> ${m.away}</div></div>
    <div class="mc-right"><div class="mc-date">${m.date}</div><div class="mc-time">${m.score||m.time}</div></div>
  </div>`;
}

function renderMorning(){
  const todayM = getAllMatches().filter(m=>m.isToday);
  const hotNews = cachedNews.slice(0,3);
  let h = `<div class="brief-sec"><div class="brief-hdr"><div class="bh-title">Today's Matches</div></div><div class="brief-body">`;
  h += todayM.length ? todayM.map(mCard).join('') : '<div class="empty">試合なし</div>';
  h += `</div></div><div class="brief-sec"><div class="brief-hdr"><div class="bh-title">Latest News</div></div><div class="brief-body">`;
  h += hotNews.length ? hotNews.map(n=>`<div class="news-card" onclick="window.open('${n.link}')"><div class="news-title">${n.title}</div></div>`).join('') : '<div class="empty">ニュースなし</div>';
  h += `</div></div>`;
  return h;
}

function renderStandings(){
  if(!cachedStandings) return '<div class="empty">データなし</div>';
  let h = `<table class="standings-table"><thead><tr><th>Pos</th><th>Club</th><th>Pts</th></tr></thead><tbody>`;
  cachedStandings.forEach(r=>{ h+=`<tr><td>${r.position}</td><td>${r.team.name}</td><td class="pts">${r.points}</td></tr>`; });
  h += `</tbody></table>`;
  return h;
}

function leagueGrid(){
  const leagues=[{id:'epl',label:'PL'},{id:'fa',label:'FA'},{id:'ucl',label:'CL'},{id:'wc',label:'W杯'}];
  return leagues.map(l=>`<div class="srow"><div class="srow-lbl">${l.label}</div><button class="tog ${enabledLeagues.has(l.id)?'on':''}" onclick="toggleLeague('${l.id}')"></button></div>`).join('');
}

function toggleLeague(id){ if(enabledLeagues.has(id))enabledLeagues.delete(id); else enabledLeagues.add(id); render(); }
function toggleStar(id){ if(starred.has(id))starred.delete(id); else starred.add(id); localStorage.setItem('starred',JSON.stringify([...starred])); render(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }

function sw(t,el){ activeTab=t; document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on')); el.classList.add('on'); render(); }
function swBni(t,idx){ activeTab=t; document.querySelectorAll('.bni').forEach(x=>x.classList.remove('on')); event.currentTarget.classList.add('on'); render(); }

function render(){
  const el=document.getElementById('main');
  if(activeTab==='morning') el.innerHTML=renderMorning();
  else if(activeTab==='standings') el.innerHTML=renderStandings();
  else if(activeTab==='setting') el.innerHTML=leagueGrid();
  else el.innerHTML='<div class="empty">Coming Soon</div>';
}

(async()=>{ await refreshAll(); })();
</script>
</body>
</html>
